_target_: src.rainbow.model.RainbowDQN

name: rainbow

in_channels: ${env.stack_size}
action_bins: ${env.action_bins}
num_branches: ???          # filled at runtime from env action space

# C51 distributional support
atoms: 51
vmin: -10.0
vmax: 600.0

# NoisyNet: set to false to use standard linear layers (pair with eps_greedy)
noisy: ${is_equal:${train.exploration}, "noisy"} 

# NoisyNet initial sigma (ignored when noisy == false)
noisy_sigma0: 0.5

# Dueling head hidden layer width
head_hidden_dim: 512