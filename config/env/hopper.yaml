defaults:
  - _self_

name: "Hopper-v5"
num_envs: 30

# observation
obs_size: 64
stack_size: 4

encoder:
  mlp_keys: $^
  cnn_keys: image

decoder:
  mlp_keys: $^
  cnn_keys: image

# reward shaping
target_velocity: 1.5          
forward_reward_weight: 3.0  
healthy_reward: 1.0     
ctrl_cost_weight: 0.001     # Default is 0.001.

# env-specific init
frame_skip: 4
healthy_z_range: null    # Default is [0.7, inf]
healthy_angle_range: [-0.4, 0.4]  # Default is [-0.2, 0.2]
reset_noise_scale: 0.005          # Default is 0.005
max_episode_steps: 5000           # ~30s of sim time (dt=0.008) and 2m or real time

xml_file: null
# xml_file: ".venv/Lib/site-packages/gymnasium/envs/mujoco/assets/hopper.xml"