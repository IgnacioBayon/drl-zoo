defaults:
  - _self_

name: "Humanoid-v5"
num_envs: 30

# observation
obs_size: 96
stack_size: 4

encoder:
  mlp_keys: $^
  cnn_keys: image

decoder:
  mlp_keys: $^
  cnn_keys: image

# reward shaping
target_velocity: 1.5
forward_reward_weight: 3.0
healthy_reward: 1.0
ctrl_cost_weight: 0.01
contact_cost_weight: 0   # Default is 5e-7

# env-specific init
frame_skip: 5           # Default is 5
healthy_z_range: null     # Default is (1.0, 2.0)
reset_noise_scale: 0.01          # Default is 0.01
max_episode_steps: 5000           # ~30s of sim time (dt=0.008) and 2m or real time

#   0 abdomen_y,        1 abdomen_z,        2 abdomen_x,
#   3 right_hip_x,      4 right_hip_z,      5 right_hip_y, 6 right_knee,
#   7 left_hip_x,       8 left_hip_z,       9 left_hip_y, 10 left_knee,
#  11 right_shoulder1,  12 right_shoulder2, 13 right_elbow,
#  14 left_shoulder1,   15 left_shoulder2,  16 left_elbow
frozen_joints: [1, 4, 8, 11, 12, 13, 14, 15, 16]  # limp arms and z hips
# frozen_joints: null

xml_file: null
# xml_file: ".venv/Lib/site-packages/gymnasium/envs/mujoco/assets/hopper.xml"