device: auto

# model
model:
  _target_: src.ppo.model.PPO

  in_channels: ${env.stack_size}
  action_dim: ???
  share_encoder: false

# PPO always uses continuous actions (no discretization wrapper)
discretize_actions: false

# optimizer
lr: 1e-4
max_grad_norm: 0.5

# RL
gamma: 0.99
gae_lambda: 0.95
total_frames: 50_000_000

# PPO loss
c1: 0.5 # Value loss coefficient
c2: 0.01   # Entropy bonus coefficient
clip_ratio: 0.2
target_kl: 0.01
value_clip: 0.2

# ppo
rollout_steps: 1024
batch_size: 256
update_epochs: 5