device: auto

# model
model:
  act_entropy: 3e-4
  kl_free: 1.0
  imag_horizon: 15
  horizon: 333
  lamb: 0.95
  compile: true
  log_grads: false
  device: ${train.device}
  rep_loss: r2dreamer

  lr: 4e-5
  agc: 0.3
  pmin: 1e-3
  eps: 1e-20
  beta1: 0.9
  beta2: 0.999
  warmup: 1000
  slow_target_update: 1
  slow_target_fraction: 0.02

  loss_scales:
    barlow: 0.05
    infonce: 1.0
    recon: 1.0
    rew: 1.0
    con: 1.0
    dyn: 1.0
    rep: 0.1
    policy: 1.0
    value: 1.0
    repval: 0.3
    swav: 1.0
    temp: 1.0
    norm: 1.0

  r2dreamer:
    lambd: 5e-4

  dreamer_pro:
    warm_up: 1
    num_prototypes: 2500
    proto_dim: 32
    temperature: 0.1
    sinkhorn_eps: 0.05
    sinkhorn_iters: 3
    ema_update_every: 1
    ema_update_fraction: 0.05
    freeze_prototypes_iters: 10000
    aug:
      max_delta: 3.0
      same_across_time: true
      bilinear: true

  rssm:
    stoch: 32
    deter: 2048
    hidden: 256
    discrete: 16
    img_layers: 2
    obs_layers: 1
    dyn_layers: 1
    blocks: 8
    act: SiLU
    norm: true
    unimix_ratio: 0.01
    initial: learned
    device: ${train.device}

  encoder:
    mlp_keys: ${env.encoder.mlp_keys}
    cnn_keys: ${env.encoder.cnn_keys}
    mlp:
      shape: null
      layers: 3
      units: 256
      act: SiLU
      norm: true
      device: ${train.device}
      outscale: null
      symlog_inputs: true
      name: mlp_encoder
    cnn:
      act: SiLU
      norm: true
      kernel_size: 5
      minres: 4
      depth: 16
      mults: [2, 3, 4, 4]

  decoder:
    mlp_keys: ${env.decoder.mlp_keys}
    cnn_keys: ${env.decoder.cnn_keys}
    mlp_dist:
      name: symlog_mse
    cnn_dist:
      name: mse
    mlp:
      shape: null
      layers: 3
      units: 256
      act: SiLU
      norm: true
      dist:
        name: identity
      device: ${train.device}
      outscale: 1.0
      symlog_inputs: false
      name: mlp_decoder
    cnn:
      depth: 16
      units: 256
      bspace: 8
      mults: [2, 3, 4, 4]
      act: SiLU
      norm: true
      kernel_size: 5
      minres: 4
      outscale: 1.0

  reward:
    shape: [255]
    layers: 1
    units: 256
    act: SiLU
    norm: true
    dist:
      name: symexp_twohot
      bin_num: 255
    outscale: 0.0
    device: ${train.device}
    symlog_inputs: false
    name: reward

  cont:
    shape: [1]
    layers: 1
    units: 256
    act: SiLU
    norm: true
    dist:
      name: binary
    outscale: 1.0
    device: ${train.device}
    symlog_inputs: false
    name: cont

  actor:
    shape: null
    layers: 3
    units: 256
    act: SiLU
    norm: true
    device: ${train.device}
    dist:
      cont:
        name: bounded_normal
        min_std: 0.1
        max_std: 1.0
      disc:
        name: onehot
        unimix_ratio: 0.01
      multi_disc:
        name: multi_onehot
        unimix_ratio: 0.01
    outscale: 0.01
    symlog_inputs: false
    name: actor

  critic:
    shape: [255]
    layers: 3
    units: 256
    act: SiLU
    norm: true
    device: ${train.device}
    dist:
      name: symexp_twohot
      bin_num: 255
    outscale: 0.0
    symlog_inputs: false
    name: value

  deter: 2048
  hidden: 256
  discrete: 16
  depth: 16
  units: 256
  act: SiLU
  norm: true

# rollout / buffer
batch_size: 16
batch_length: 64

buffer:
  batch_size: ${train.batch_size}
  batch_length: ${train.batch_length}
  max_size: 500000
  device: ${train.device}
  storage_device: ${train.device}

trainer:
  steps: 1_010_000
  pretrain: 0
  eval_every: 10_000
  eval_episode_num: ${eval_episodes}
  batch_size: ${train.batch_size}
  batch_length: ${train.batch_length}
  train_ratio: 512
  video_pred_log: false
  params_hist_log: false
  update_log_every: 5_000
  action_repeat: 2

discretize_actions: false
action_multidiscrete: false