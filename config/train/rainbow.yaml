device: auto   # auto | cpu | cuda

# model
model:
  _target_: src.rainbow.model.RainbowDQN
  in_channels: ${env.stack_size}
  action_bins: ${env.action_bins}
  num_branches: ???          # filled at runtime from env action space
  # C51 distributional support
  atoms: 51
  vmin: -10.0
  vmax: 400.0
  # NoisyNet initial sigma
  noisy_sigma0: 0.5
  # Dueling head hidden layer width
  head_hidden_dim: 512

# optimiser
lr: 1e-4            # standard Rainbow lr (Hessel et al. 2017)

# RL
gamma: 0.99
total_frames: 50_000_000

# replay buffer
buffer_size: 300_000
batch_size: 64
start_train_after: 30_000    # collect this many frames before the first gradient step

# network updates
train_every: 10                # gradient step every N env frames
target_update_frames: 10_000  # ~8k gradient steps between copies (standard Rainbow)
max_grad_norm: 10.0           # clip gradient L2 norm

# Multi-step returns
n_step: 3

# Prioritized Experience Replay
per_alpha: 0.6        # prioritisation exponent (0 = uniform)
per_beta_start: 0.4    # initial IS-weight correction
per_beta_frames: 1_000_000  # anneal β → 1.0 over this many frames

# logging / recording
eval_interval_frames: 100_000  # evaluate & record every N frames
eval_episodes: 5              # number of greedy episodes per evaluation
log_interval_frames: 10_000    # tensorboard scalar logging interval
