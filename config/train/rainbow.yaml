device: auto   # auto | cpu | cuda

# loss
loss_fn: huber  # mse | huber

# optimiser
lr: 2e-4

# RL
gamma: 0.99
total_frames: 2_000_000

# replay buffer
buffer_size: 500_000
batch_size: 32
start_train_after: 50_000    # collect this many frames before the first gradient step

# network updates
train_every: 4                # gradient step every N env frames
target_update_frames: 2_000  # hard copy policy → target (decoupled from eval interval)
max_grad_norm: 10.0           # clip gradient L2 norm

# Multi-step returns
n_step: 3

# Prioritized Experience Replay
per_alpha: 0.5        # prioritisation exponent (0 = uniform)
per_beta_start: 0.4    # initial IS-weight correction
per_beta_frames: ${.total_frames}  # anneal β → 1.0 over this many frames

# logging / recording
eval_interval_frames: 5_000  # evaluate & record every N frames
eval_episodes: 10             # number of greedy episodes per evaluation
log_interval_frames: 5_000    # tensorboard scalar logging interval
