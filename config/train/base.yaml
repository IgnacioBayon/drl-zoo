device: auto   # auto | cpu | cuda

# loss
loss_fn: huber  # mse | huber

# optimiser
lr: 3e-4

# RL
gamma: 0.99
total_frames: 1_000_000

# replay buffer
buffer_size: 500_000
batch_size: 32
start_train_after: 50_000    # collect this many frames before the first gradient step

# exploration (linear ε-decay)
epsilon_start: 1.0
epsilon_end: 0.05
epsilon_anneal_frames: 100_000

# network updates
train_every: 4                # gradient step every N env frames
target_update_frames: 10_000  # hard copy policy → target (decoupled from eval interval)

# logging / recording
eval_interval_frames: 5_000  # evaluate & record every N frames
eval_episodes: 20             # number of greedy episodes per evaluation
log_interval_frames: 5_000    # tensorboard scalar logging interval
